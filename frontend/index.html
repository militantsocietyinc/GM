<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bantay Pilipinas — Philippine Monitor</title>
    <meta name="description" content="Real-time Philippine intelligence dashboard — West Philippine Sea, disaster tracking, economic intelligence, local news" />
    <meta name="theme-color" content="#0c1425" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0c1425;
        color: #e0e6f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
        overflow: hidden;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 16px;
      }
      .loading-screen h1 {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 2px;
        color: #4fc3f7;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(79, 195, 247, 0.2);
        border-top-color: #4fc3f7;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading-screen">
        <h1>BANTAY PILIPINAS</h1>
        <div class="spinner"></div>
        <p>Initializing Philippine Monitor...</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
