<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能源 ERP 情报中心 - Firecrawl 实时抓取</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0a0f1e 0%, #1a1a2e 100%); color: #e0e0e0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #2d3a5a; margin-bottom: 20px; }
        .logo h1 { font-size: 26px; color: #fff; margin-bottom: 5px; }
        .logo p { font-size: 12px; color: #666; }
        .refresh-btn { padding: 10px 20px; background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; border-radius: 8px; color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .refresh-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,212,255,0.4); }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-bar { background: linear-gradient(145deg, #1e2745, #232d4a); border-radius: 12px; padding: 15px 20px; margin-bottom: 20px; border: 1px solid #2d3a5a; display: flex; justify-content: space-between; align-items: center; }
        .status-info { display: flex; gap: 20px; align-items: center; }
        .status-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.live { background: #4caf50; animation: pulse 2s infinite; }
        .status-dot.loading { background: #ff9800; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; }
        .news-card { background: linear-gradient(145deg, #1a2338, #1f2a40); border-radius: 10px; padding: 15px; border: 1px solid #2d3a5a; transition: all 0.3s; }
        .news-card:hover { transform: translateY(-3px); border-color: #3d4a6a; }
        .news-card .vendor { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 9px; margin-bottom: 8px; }
        .news-card .vendor-yuanguang { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .news-card .vendor-yongyou { background: rgba(76,175,80,0.2); color: #4caf50; }
        .news-card .vendor-jindie { background: rgba(156,39,176,0.2); color: #9c27b0; }
        .news-card .vendor-langchao { background: rgba(255,152,0,0.2); color: #ff9800; }
        .news-card .vendor-zhongxing { background: rgba(158,158,158,0.2); color: #9e9e9e; }
        .news-card .title { font-size: 13px; color: #fff; margin-bottom: 8px; line-height: 1.5; }
        .news-card .meta { display: flex; gap: 10px; font-size: 10px; color: #666; margin-bottom: 10px; }
        .news-card .ai-summary { background: linear-gradient(145deg, rgba(0,212,255,0.1), rgba(0,212,255,0.05)); padding: 10px; border-radius: 8px; border-left: 3px solid #00d4ff; font-size: 11px; line-height: 1.6; margin-bottom: 10px; }
        .news-card .actions { display: flex; gap: 8px; }
        .news-card a { color: #00d4ff; text-decoration: none; font-size: 11px; }
        .news-card a:hover { text-decoration: underline; }
        .loading-state { text-align: center; padding: 50px 20px; color: #666; }
        .loading-state .spinner { width: 40px; height: 40px; border: 4px solid #2d3a5a; border-top-color: #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-state { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.3); border-radius: 10px; padding: 20px; text-align: center; color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>⚡ 能源 ERP 情报中心</h1>
                <p>Firecrawl 实时抓取 · 真实可访问链接</p>
            </div>
            <button class="refresh-btn" onclick="refreshNews()" id="refreshBtn">
                🔄 刷新新闻
            </button>
        </div>
        
        <div class="status-bar">
            <div class="status-info">
                <div class="status-item">
                    <div class="status-dot live" id="statusDot"></div>
                    <span id="statusText">实时连接中</span>
                </div>
                <div class="status-item">
                    <span>📅 <span id="lastUpdate">--</span></span>
                </div>
                <div class="status-item">
                    <span>📰 <span id="newsCount">0</span> 条新闻</span>
                </div>
            </div>
            <div class="status-item">
                <span style="font-size: 11px; color: #666;">🔥 Firecrawl API 实时抓取</span>
            </div>
        </div>
        
        <div id="newsContainer">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>正在使用 Firecrawl 抓取最新新闻...</p>
                <p style="font-size: 11px; color: #666; margin-top: 10px;">正在搜索五厂商官网、政府采购网、财经媒体等来源</p>
            </div>
        </div>
    </div>

    <script>
        const FIRECRAWL_API_KEY = 'fc-6e52871e239a4ca6976380df246c7e31';
        const FIRECRAWL_API_URL = 'https://api.firecrawl.dev/v1/search';
        
        const VENDOR_CONFIG = {
            '远光软件': { color: 'vendor-yuanguang', emoji: '🔵', queries: ['远光软件 涨停 算电协同 site:eastmoney.com', '远光软件 中标 site:ccgp.gov.cn', '远光软件 site:ygsoft.com'] },
            '用友网络': { color: 'vendor-yongyou', emoji: '🟢', queries: ['用友网络 中标 site:ccgp.gov.cn', '用友网络 BIP site:yonyou.com', '用友网络 site:10jqka.com.cn'] },
            '金蝶国际': { color: 'vendor-jindie', emoji: '🟣', queries: ['金蝶国际 业绩 site:kingdee.com', '金蝶 云·苍穹 site:kingdee.com', '金蝶国际 site:ccgp.gov.cn'] },
            '浪潮软件': { color: 'vendor-langchao', emoji: '🟠', queries: ['浪潮软件 政务云 site:inspur.com', '浪潮软件 中标 site:ccgp.gov.cn', '浪潮软件 site:10jqka.com.cn'] },
            '中兴新云': { color: 'vendor-zhongxing', emoji: '⚪', queries: ['中兴新云 财务云 site:zte.com.cn', '中兴新云 中标 site:ccgp.gov.cn'] }
        };

        async function searchFirecrawl(query, limit = 3) {
            try {
                const response = await fetch(FIRECRAWL_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${FIRECRAWL_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query, limit })
                });
                
                if (!response.ok) throw new Error(`API 错误：${response.status}`);
                const data = await response.json();
                return data.data || [];
            } catch (error) {
                console.error('Firecrawl 搜索失败:', error);
                return [];
            }
        }

        function extractSource(url) {
            const hostname = new URL(url).hostname;
            if (hostname.includes('eastmoney')) return '东方财富';
            if (hostname.includes('10jqka')) return '同花顺';
            if (hostname.includes('ccgp')) return '中国政府采购网';
            if (hostname.includes('ygsoft')) return '远光官网';
            if (hostname.includes('yonyou')) return '用友官网';
            if (hostname.includes('kingdee')) return '金蝶官网';
            if (hostname.includes('inspur')) return '浪潮官网';
            if (hostname.includes('zte')) return '中兴官网';
            return hostname.replace('www.', '');
        }

        function generateAISummary(item, vendor) {
            const config = VENDOR_CONFIG[vendor];
            const desc = item.description || item.title;
            return `${config.emoji} ${vendor}：${desc.substring(0, 120)}${desc.length > 120 ? '...' : ''}`;
        }

        async function fetchVendorNews(vendor) {
            const config = VENDOR_CONFIG[vendor];
            const allNews = [];
            
            for (const query of config.queries) {
                const results = await searchFirecrawl(query, 3);
                allNews.push(...results);
            }
            
            const seen = new Set();
            return allNews
                .filter(item => {
                    if (!item.url || seen.has(item.url)) return false;
                    seen.add(item.url);
                    return true;
                })
                .slice(0, 8)
                .map(item => ({
                    vendor,
                    color: config.color,
                    title: item.title || '无标题',
                    source: extractSource(item.url),
                    date: new Date().toISOString().split('T')[0],
                    url: item.url,
                    aiSummary: generateAISummary(item, vendor),
                    description: item.description || ''
                }));
        }

        async function refreshNews() {
            const btn = document.getElementById('refreshBtn');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const container = document.getElementById('newsContainer');
            
            btn.disabled = true;
            statusDot.className = 'status-dot loading';
            statusText.textContent = '正在抓取...';
            
            container.innerHTML = `
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>正在使用 Firecrawl 抓取最新新闻...</p>
                    <p style="font-size: 11px; color: #666; margin-top: 10px;">正在搜索五厂商官网、政府采购网、财经媒体等来源</p>
                </div>
            `;
            
            try {
                const vendors = Object.keys(VENDOR_CONFIG);
                const allNews = [];
                
                for (const vendor of vendors) {
                    statusText.textContent = `正在抓取 ${vendor}...`;
                    const news = await fetchVendorNews(vendor);
                    allNews.push(...news);
                }
                
                // 按日期排序
                allNews.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                // 渲染新闻卡片
                container.innerHTML = `
                    <div class="news-grid">
                        ${allNews.map(news => `
                            <div class="news-card">
                                <span class="vendor ${news.color}">${news.vendor}</span>
                                <div class="title">${news.title}</div>
                                <div class="meta">
                                    <span>${news.source}</span>
                                    <span>${news.date}</span>
                                </div>
                                <div class="ai-summary">${news.aiSummary}</div>
                                <div class="actions">
                                    <a href="${news.url}" target="_blank" rel="noopener noreferrer">📄 查看原始资讯 →</a>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                // 更新状态
                document.getElementById('newsCount').textContent = allNews.length;
                document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
                statusDot.className = 'status-dot live';
                statusText.textContent = '实时更新';
                
            } catch (error) {
                container.innerHTML = `
                    <div class="error-state">
                        <h3>❌ 抓取失败</h3>
                        <p>${error.message}</p>
                        <button class="refresh-btn" onclick="refreshNews()" style="margin-top: 15px;">🔄 重试</button>
                    </div>
                `;
            } finally {
                btn.disabled = false;
            }
        }

        // 页面加载时自动抓取
        window.addEventListener('DOMContentLoaded', refreshNews);
    </script>
</body>
</html>
