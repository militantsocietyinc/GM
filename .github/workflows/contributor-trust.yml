name: Contributor Trust

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  check:
    # Skip for repo members/owners/collaborators
    if: |
      github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' ||
      github.event.pull_request.author_association == 'FIRST_TIMER' ||
      github.event.pull_request.author_association == 'CONTRIBUTOR' ||
      github.event.pull_request.author_association == 'NONE'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check contributor trust
        id: brin
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          RESPONSE=$(curl -sf "https://api.brin.sh/contributor/${AUTHOR}" || echo '{}')
          echo "response=$RESPONSE" >> "$GITHUB_OUTPUT"

          SCORE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('score','N/A'))")
          VERDICT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('verdict','unknown'))")
          CONFIDENCE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('confidence','unknown'))")

          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "confidence=$CONFIDENCE" >> "$GITHUB_OUTPUT"

      - name: Post trust report
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          BRIN_SCORE: ${{ steps.brin.outputs.score }}
          BRIN_VERDICT: ${{ steps.brin.outputs.verdict }}
          BRIN_CONFIDENCE: ${{ steps.brin.outputs.confidence }}
        with:
          script: |
            const score = parseInt(process.env.BRIN_SCORE) || 0;
            const verdict = process.env.BRIN_VERDICT || 'unknown';
            const confidence = process.env.BRIN_CONFIDENCE || 'unknown';

            const emoji = {
              safe: '✅',
              caution: '⚠️',
              suspicious: '🚨',
              dangerous: '🛑',
              unknown: '❓',
            }[verdict] ?? '❓';

            const body = [
              `### ${emoji} Contributor Trust Report`,
              '',
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Score** | ${score}/100 |`,
              `| **Verdict** | \`${verdict}\` |`,
              `| **Confidence** | ${confidence} |`,
              `| **Author** | @${context.payload.pull_request.user.login} |`,
              '',
              verdict === 'safe'
                ? '_No action needed. Review the code as normal._'
                : verdict === 'caution'
                ? '_Please review this PR carefully before merging._'
                : '_High-risk contributor flagged by Brin. Review with extra scrutiny._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
