name: 'Build Desktop App'

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build-only variant'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - tech
          - finance
  push:
    tags:
      - 'v*'

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  release-context:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.context.outputs.publish }}
      variant: ${{ steps.context.outputs.variant }}
      version: ${{ steps.context.outputs.version }}
      tag: ${{ steps.context.outputs.tag }}
      release_name: ${{ steps.context.outputs.releaseName }}
      product_name: ${{ steps.context.outputs.productName }}
      commit_sha: ${{ steps.context.outputs.commitSha }}
      short_sha: ${{ steps.context.outputs.shortSha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'

      - name: Resolve release context
        id: context
        shell: bash
        run: |
          node scripts/release-context.mjs \
            --event "${{ github.event_name }}" \
            --ref "${{ github.ref_name }}" \
            --variant "${{ github.event.inputs.variant }}" \
            --sha "${{ github.sha }}" \
            --github-output "$GITHUB_OUTPUT"

  build-tauri:
    needs: release-context
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14'
            args: '--target aarch64-apple-darwin'
            node_target: 'aarch64-apple-darwin'
            label: 'macOS-ARM64'
            timeout: 180
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            node_target: 'x86_64-apple-darwin'
            label: 'macOS-x64'
            timeout: 180
          - platform: 'windows-latest'
            args: ''
            node_target: 'x86_64-pc-windows-msvc'
            label: 'Windows-x64'
            timeout: 120
          - platform: 'ubuntu-24.04'
            args: ''
            node_target: 'x86_64-unknown-linux-gnu'
            label: 'Linux-x64'
            timeout: 120
          - platform: 'ubuntu-24.04-arm'
            args: '--target aarch64-unknown-linux-gnu'
            node_target: 'aarch64-unknown-linux-gnu'
            label: 'Linux-ARM64'
            timeout: 120

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})
    timeout-minutes: ${{ matrix.timeout }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Start job timer
        shell: bash
        run: echo "JOB_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: stable
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || (matrix.label == 'Linux-ARM64' && 'aarch64-unknown-linux-gnu' || '') }}

      - name: Rust cache
        uses: swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Install Linux system dependencies
        if: contains(matrix.platform, 'ubuntu')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-gl

      - name: Validate package-lock.json
        run: npm run lockfile:check

      - name: Install frontend dependencies
        run: npm ci

      - name: Check version consistency
        run: npm run version:check

      - name: Bundle Node.js runtime
        shell: bash
        env:
          NODE_VERSION: '22.14.0'
          NODE_TARGET: ${{ matrix.node_target }}
        run: bash scripts/download-node.sh --target "$NODE_TARGET"

      - name: Verify bundled Node.js payload
        shell: bash
        run: |
          if [ "${{ matrix.node_target }}" = "x86_64-pc-windows-msvc" ]; then
            test -f src-tauri/sidecar/node/node.exe
            ls -lh src-tauri/sidecar/node/node.exe
          else
            test -f src-tauri/sidecar/node/node
            test -x src-tauri/sidecar/node/node
            ls -lh src-tauri/sidecar/node/node
          fi

      - name: Check Apple signing secrets
        if: contains(matrix.platform, 'macos')
        id: apple-signing
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ] && [ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ] && [ -n "${{ secrets.KEYCHAIN_PASSWORD }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple Developer Certificate
        if: contains(matrix.platform, 'macos') && steps.apple-signing.outputs.available == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          if [ -z "$CERT_ID" ]; then
            echo "::error::No Developer ID Application certificate found in keychain."
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Resolve Tauri build arguments
        shell: bash
        run: |
          echo "WM_BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          case "${{ needs.release-context.outputs.variant }}" in
            full) EXTRA_ARGS="" ;;
            tech) EXTRA_ARGS="--config src-tauri/tauri.tech.conf.json" ;;
            finance) EXTRA_ARGS="--config src-tauri/tauri.finance.conf.json" ;;
            *) echo "::error::Unsupported variant"; exit 1 ;;
          esac
          echo "TAURI_BUILD_ARGS=${EXTRA_ARGS} ${{ matrix.args }}" >> "$GITHUB_ENV"

      - name: Build Tauri app
        shell: bash
        env:
          VITE_VARIANT: ${{ needs.release-context.outputs.variant }}
          VITE_DESKTOP_RUNTIME: '1'
          WM_BUILD_VARIANT: ${{ needs.release-context.outputs.variant }}
          WM_BUILD_TAG: ${{ needs.release-context.outputs.tag }}
          WM_BUILD_COMMIT_SHA: ${{ needs.release-context.outputs.commit_sha }}
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm exec tauri build -- $TAURI_BUILD_ARGS

      - name: Verify signed macOS bundle + embedded runtime
        if: contains(matrix.platform, 'macos') && steps.apple-signing.outputs.available == 'true'
        shell: bash
        run: |
          APP_PATH=$(find src-tauri/target -type d -path '*/bundle/macos/*.app' | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No macOS .app bundle found after build."
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          NODE_PATH=$(find "$APP_PATH/Contents/Resources" -type f -path '*/sidecar/node/node' | head -1)
          if [ -z "$NODE_PATH" ]; then
            echo "::error::Bundled Node runtime missing from app resources."
            exit 1
          fi
          echo "Verified signed app bundle and embedded Node runtime: $NODE_PATH"

      - name: Verify Windows installer artifacts
        if: contains(matrix.platform, 'windows')
        shell: bash
        run: |
          MSI=$(find src-tauri/target -path '*/bundle/msi/*.msi' | head -1)
          NSIS=$(find src-tauri/target -path '*/bundle/nsis/*.exe' | head -1)
          if [ -z "$MSI" ] && [ -z "$NSIS" ]; then
            echo "::error::No Windows installer artifacts found after build."
            exit 1
          fi

      - name: Smoke-test AppImage (Linux)
        if: contains(matrix.platform, 'ubuntu')
        shell: bash
        run: |
          sudo apt-get install -y xvfb imagemagick
          APPIMAGE=$(find src-tauri/target -path '*/bundle/appimage/*.AppImage' | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "::error::No AppImage found after build"
            exit 1
          fi
          chmod +x "$APPIMAGE"
          Xvfb :99 -screen 0 1440x900x24 &
          export DISPLAY=:99
          sleep 2
          "$APPIMAGE" --no-sandbox &
          APP_PID=$!
          sleep 15
          import -window root screenshot.png || true
          if kill -0 $APP_PID 2>/dev/null; then
            kill $APP_PID || true
          else
            echo "❌ AppImage crashed during startup"
            exit 1
          fi

      - name: Collect release manifest
        shell: bash
        run: |
          mkdir -p release-dist/assets
          node scripts/release-manifest.mjs \
            --mode collect \
            --target-root src-tauri/target \
            --version "${{ needs.release-context.outputs.version }}" \
            --variant "${{ needs.release-context.outputs.variant }}" \
            --tag "${{ needs.release-context.outputs.tag }}" \
            --commit-sha "${{ needs.release-context.outputs.commit_sha }}" \
            --platform "${{ matrix.label }}" \
            --generated-at "$WM_BUILD_TIMESTAMP" \
            --output release-dist/manifest.json
          node --input-type=module -e "import fs from 'node:fs'; import path from 'node:path'; const manifest = JSON.parse(fs.readFileSync('release-dist/manifest.json', 'utf8')); for (const asset of manifest.assets) { fs.copyFileSync(asset.path, path.join('release-dist/assets', asset.name)); }"

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ matrix.label }}
          path: |
            release-dist/assets
            release-dist/manifest.json
          if-no-files-found: error

      - name: Upload smoke test screenshot
        if: contains(matrix.platform, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: linux-smoke-test-screenshot-${{ matrix.label }}
          path: screenshot.png
          if-no-files-found: warn

      - name: Cleanup Apple signing materials
        if: always() && contains(matrix.platform, 'macos')
        shell: bash
        run: |
          rm -f certificate.p12
          security delete-keychain build.keychain || true

      - name: Report build duration
        if: always()
        shell: bash
        run: |
          if [ -z "${JOB_START_EPOCH:-}" ]; then
            echo "::warning::JOB_START_EPOCH missing; duration unavailable."
            exit 0
          fi
          END_EPOCH=$(date +%s)
          ELAPSED=$((END_EPOCH - JOB_START_EPOCH))
          MINUTES=$((ELAPSED / 60))
          SECONDS=$((ELAPSED % 60))
          echo "Build duration for ${{ matrix.label }}: ${MINUTES}m ${SECONDS}s"

  publish-release:
    needs:
      - release-context
      - build-tauri
    if: needs.release-context.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'

      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          path: downloaded-bundles
          pattern: release-bundle-*
          merge-multiple: false

      - name: Build consolidated release manifest
        shell: bash
        run: |
          node scripts/release-manifest.mjs \
            --mode combine \
            --manifests-dir downloaded-bundles \
            --output release-manifest.json

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.release-context.outputs.tag }}"
          TITLE="${{ needs.release-context.outputs.release_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE"
          else
            gh release create "$TAG" --title "$TITLE" --notes "See changelog below." --verify-tag
          fi

      - name: Upload release assets and manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.release-context.outputs.tag }}"
          mapfile -t ASSET_FILES < <(find downloaded-bundles -type f -path '*/assets/*' | sort)
          gh release upload "$TAG" "${ASSET_FILES[@]}" release-manifest.json --clobber

      - name: Verify uploaded release payload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.release-context.outputs.tag }}"
          mkdir -p downloaded-release
          gh release download "$TAG" --dir downloaded-release
          node scripts/release-manifest.mjs \
            --mode verify \
            --output release-manifest.json \
            --download-dir downloaded-release

      - name: Generate and update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.release-context.outputs.tag }}"
          VARIANT="${{ needs.release-context.outputs.variant }}"
          PREV_TAG=$(node --input-type=module -e "import { execSync } from 'node:child_process'; const tag = process.env.TAG; const variant = process.env.VARIANT; const tags = execSync('git tag --sort=-version:refname', { encoding: 'utf8' }).trim().split('\n').filter(Boolean); const matcher = variant === 'full' ? /^v\\d+\\.\\d+\\.\\d+$/ : new RegExp(`^v\\\\d+\\\\.\\\\d+\\\\.\\\\d+-${variant}$`); const prev = tags.find((candidate) => candidate !== tag && matcher.test(candidate)) || ''; process.stdout.write(prev);")
          if [ -z "$PREV_TAG" ]; then
            COMMITS="Initial release"
          else
            COMMITS=$(git log "${PREV_TAG}..${TAG}" --oneline --no-merges | sed 's/^[a-f0-9]*//' | sed 's/^ /- /')
          fi
          BODY=$(cat <<NOTES
          ## What's Changed

          ${COMMITS}

          Release manifest includes commit `${{ needs.release-context.outputs.short_sha }}` and checksums for every uploaded artifact.
          NOTES
          )
          gh release edit "$TAG" --notes "$BODY"
